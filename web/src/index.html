<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QLGIS Preview</title>
    <link rel="stylesheet" href="./main.css">
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="hud" class="hud">
        <div class="hud__header">
          <div id="meta-eyebrow" class="hud__eyebrow"></div>
          <div id="meta-title" class="hud__title"></div>
          <div id="meta-description" class="hud__description"></div>
        </div>
        <label id="selector-group" class="selector" hidden>
          <span id="selector-label" class="selector__label"></span>
          <select id="selector-input" class="selector__input"></select>
        </label>
        <div id="status" class="hud__status" hidden></div>
      </div>
      <div id="banner" class="overlay overlay--banner" hidden></div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
