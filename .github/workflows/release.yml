name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      EXPORT_OPTIONS_PLIST: ${{ github.workspace }}/Config/ExportOptions.DeveloperID.plist
      RELEASE_ROOT: ${{ github.workspace }}/build/release
      ZIP_PATH: ${{ github.workspace }}/build/release/QLGIS-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}-macOS.zip
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set keychain and certificate paths
        run: |
          echo "KEYCHAIN_PATH=${RUNNER_TEMP}/build.keychain-db" >> "$GITHUB_ENV"
          echo "CERTIFICATE_PATH=${RUNNER_TEMP}/developer-id.p12" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Write release secrets
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          cat > Config/Secrets.xcconfig <<EOF
          MAPTILER_API_KEY = ${MAPTILER_API_KEY}
          EOF

      - name: Install Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "${BUILD_CERTIFICATE_BASE64}" | base64 -D -o "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials qlgis-ci \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --keychain "${KEYCHAIN_PATH}"

      - name: Archive, export, notarize, and package
        env:
          NOTARYTOOL_PROFILE: qlgis-ci
          NOTARYTOOL_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          PROJECT_PATH: ${{ github.workspace }}/QLGIS.xcodeproj
          SCHEME: QLGIS
          CONFIGURATION: Release
          DESTINATION: platform=macOS
        run: |
          set -euo pipefail
          ARCHIVE_PATH="${RELEASE_ROOT}/${SCHEME}.xcarchive"
          EXPORT_PATH="${RELEASE_ROOT}/export"
          APP_PATH="${EXPORT_PATH}/${SCHEME}.app"
          NOTARY_ZIP_PATH="${RELEASE_ROOT}/${SCHEME}-notarization.zip"

          if [[ ! -f "${PROJECT_PATH}/project.pbxproj" ]]; then
            echo "Project not found at ${PROJECT_PATH}" >&2
            exit 1
          fi

          if [[ ! -f "${EXPORT_OPTIONS_PLIST}" ]]; then
            echo "Export options plist not found at ${EXPORT_OPTIONS_PLIST}" >&2
            exit 1
          fi

          mkdir -p "${RELEASE_ROOT}"
          rm -rf "${ARCHIVE_PATH}" "${EXPORT_PATH}" "${ZIP_PATH}" "${NOTARY_ZIP_PATH}"

          xcode_args=(
            -project "${PROJECT_PATH}"
            -scheme "${SCHEME}"
            -configuration "${CONFIGURATION}"
            -destination "${DESTINATION}"
          )

          echo "Archiving ${SCHEME}..."
          xcodebuild "${xcode_args[@]}" archive -archivePath "${ARCHIVE_PATH}"

          echo "Exporting archive..."
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}"

          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Expected exported app at ${APP_PATH}" >&2
            exit 1
          fi

          if [[ -n "${NOTARYTOOL_PROFILE}" ]]; then
            echo "Preparing notarization payload..."
            ditto -c -k --keepParent "${APP_PATH}" "${NOTARY_ZIP_PATH}"

            echo "Submitting for notarization with profile ${NOTARYTOOL_PROFILE}..."
            notary_args=(
              submit
              "${NOTARY_ZIP_PATH}"
              --keychain-profile
              "${NOTARYTOOL_PROFILE}"
              --wait
            )

            if [[ -n "${NOTARYTOOL_KEYCHAIN}" ]]; then
              notary_args+=(--keychain "${NOTARYTOOL_KEYCHAIN}")
            fi

            xcrun notarytool "${notary_args[@]}"

            echo "Stapling notarization ticket..."
            xcrun stapler staple "${APP_PATH}"
          fi

          echo "Creating release zip..."
          ditto -c -k --keepParent "${APP_PATH}" "${ZIP_PATH}"

          echo "Assessing exported app..."
          spctl --assess --type execute --verbose "${APP_PATH}"

          echo
          echo "Archive: ${ARCHIVE_PATH}"
          echo "App:     ${APP_PATH}"
          echo "Zip:     ${ZIP_PATH}"

          if [[ -n "${NOTARYTOOL_PROFILE}" ]]; then
            echo "Notarization: completed and stapled"
          else
            echo "Notarization: skipped (set NOTARYTOOL_PROFILE to enable)"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          gh release upload "${RELEASE_TAG}" "${ZIP_PATH}" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLGIS-${{ env.RELEASE_TAG }}-macOS
          path: ${{ env.ZIP_PATH }}

      - name: Clean up keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" || true
          rm -f "${CERTIFICATE_PATH}"
